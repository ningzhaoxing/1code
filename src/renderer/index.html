<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.posthog.com https://*.i.posthog.com; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* http://localhost:* https://unpkg.com https://21st.dev https://*.21st.dev https://*.posthog.com https://*.i.posthog.com; img-src 'self' data: blob: https:; media-src 'self' blob:;" />
    <title>VoidForge</title>
    <!-- Prevent theme flash: detect system/stored theme before render -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Dark is the primary identity: fresh installs default to dark; only an explicit
        // 'light' goes light, and 'system' still follows the OS preference.
        var theme = stored === 'light' ? 'light' : stored === 'system' ? (prefersDark ? 'dark' : 'light') : 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <style>
      /* Loading state before React loads - respects system theme */
      :root {
        --loading-bg: #FAFAF7;
        --loading-text: #161915;
        --loading-logo: #E8A23A;
      }
      .dark {
        --loading-bg: #0B0F0D;
        --loading-text: #D8E0DA;
        --loading-logo: #E8A23A;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        background: var(--loading-bg);
        color: var(--loading-text);
      }
      /* Loading container - hidden when React renders */
      .loading-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--loading-bg);
        z-index: 9999;
        transition: opacity 150ms ease-out;
      }
      /* Hide loading when root has content */
      #root:not(:empty) + .loading-container,
      #root:not(:empty) ~ .loading-container {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 24px;
        height: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-logo .vf-frame {
        fill: none;
        stroke: var(--loading-logo);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .loading-logo .vf-core {
        fill: var(--loading-logo);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loading indicator - separate from root so :empty works -->
    <div class="loading-container">
      <svg class="loading-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="vf-frame">
          <path d="M6 11V6h5" />
          <path d="M21 6h5v5" />
          <path d="M6 21v5h5" />
          <path d="M21 26h5v-5" />
        </g>
        <path class="vf-core" d="M16 10l6 6-6 6-6-6z" />
      </svg>
    </div>
    <script>
      console.log("[HTML] Inline script running - scripts work!");
      window.onerror = function(msg, url, line) {
        console.error("[HTML] Global error:", msg, "at", url, "line", line);
        document.getElementById("root").innerHTML = "<pre style='color:red;padding:20px'>Error: " + msg + "</pre>";
      };
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
